<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">从寻找便宜烟小种到重新定义交付问题</title>
  <desc id="desc">左侧错误问题无法继续，右侧重新定义为低成本保留烟熏味后分出两条可执行路径。</desc>
  <rect width="1200" height="720" fill="#f7f3eb"/>
  <g font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Noto Sans SC',sans-serif">
    <text x="72" y="86" font-size="24" font-weight="700" fill="#6f164c" letter-spacing="3">问题定义</text>
    <text x="72" y="152" font-size="50" font-family="Georgia,'Songti SC',serif" fill="#3d3b38">同一个降本需求，两种完全不同的问法</text>

    <rect x="72" y="232" width="430" height="250" rx="18" fill="#fffefa" stroke="#d8cfc4" stroke-width="2"/>
    <text x="108" y="282" font-size="18" fill="#8a8178">原来的问题</text>
    <text x="108" y="342" font-size="34" font-family="Georgia,'Songti SC',serif" fill="#3d3b38">哪里有更便宜的</text>
    <text x="108" y="390" font-size="34" font-family="Georgia,'Songti SC',serif" fill="#3d3b38">烟小种？</text>
    <line x1="108" y1="428" x2="448" y2="428" stroke="#b85c50" stroke-width="4" stroke-linecap="round"/>
    <text x="108" y="462" font-size="18" fill="#9b5149">价格更低 × 烟熏味保留：市场条件互斥</text>

    <path d="M520 356 H630" stroke="#7c746c" stroke-width="3" fill="none"/>
    <path d="M612 340 L632 356 L612 372" stroke="#7c746c" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="546" y="328" font-size="16" fill="#7c746c">重新问</text>

    <rect x="650" y="202" width="478" height="310" rx="18" fill="#fffefa" stroke="#008aa0" stroke-width="3"/>
    <text x="686" y="252" font-size="18" fill="#008aa0">真正的交付问题</text>
    <text x="686" y="312" font-size="34" font-family="Georgia,'Songti SC',serif" fill="#3d3b38">怎样用更低成本</text>
    <text x="686" y="360" font-size="34" font-family="Georgia,'Songti SC',serif" fill="#3d3b38">保留红茶底味和烟熏感？</text>

    <path d="M740 414 V456 H790" stroke="#008aa0" stroke-width="3" fill="none"/>
    <path d="M1000 414 V456 H950" stroke="#008aa0" stroke-width="3" fill="none"/>
    <rect x="682" y="456" width="220" height="92" rx="12" fill="#eaf6f7" stroke="#9bcdd3"/>
    <text x="706" y="493" font-size="19" font-weight="700" fill="#245f67">茶味与烟感拆开</text>
    <text x="706" y="522" font-size="15" fill="#4e6c70">便宜红茶底 + 可控烟熏感</text>
    <rect x="914" y="456" width="214" height="92" rx="12" fill="#f7eef4" stroke="#d5abc5"/>
    <text x="938" y="493" font-size="19" font-weight="700" fill="#6f164c">减少原料用量</text>
    <text x="938" y="522" font-size="15" fill="#775f6d">保留基底 + 补足风味</text>

    <text x="72" y="650" font-size="22" fill="#66635f">模型只是手段。先定义最终要交付什么，方案才会真正打开。</text>
  </g>
</svg>
