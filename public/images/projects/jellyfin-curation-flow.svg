<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Jellyfin Anime Curator 工作流</title>
  <desc id="desc">从只读源归档经过事实提取、分类、计划、人工审阅与安全门控，最终生成供 Jellyfin 扫描的策展树。</desc>
  <rect width="1400" height="760" fill="#f7f3eb"/>
  <g font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Noto Sans SC',sans-serif">
    <text x="72" y="84" font-size="22" font-weight="700" fill="#008aa0" letter-spacing="3">真实项目工作流</text>
    <text x="72" y="146" font-size="48" font-family="Georgia,'Songti SC',serif" fill="#3d3b38">原始动漫归档不动，先生成可审阅的发布计划</text>

    <g font-size="18" text-anchor="middle">
      <rect x="72" y="250" width="190" height="120" rx="16" fill="#fffefa" stroke="#cfc7bc" stroke-width="2"/>
      <text x="167" y="298" fill="#8a8178">输入</text>
      <text x="167" y="334" font-size="22" font-weight="700" fill="#3d3b38">只读源归档</text>

      <rect x="306" y="250" width="190" height="120" rx="16" fill="#fffefa" stroke="#cfc7bc" stroke-width="2"/>
      <text x="401" y="298" fill="#8a8178">提取</text>
      <text x="401" y="334" font-size="22" font-weight="700" fill="#3d3b38">源事实</text>

      <rect x="540" y="250" width="190" height="120" rx="16" fill="#fffefa" stroke="#cfc7bc" stroke-width="2"/>
      <text x="635" y="298" fill="#8a8178">受限判断</text>
      <text x="635" y="334" font-size="22" font-weight="700" fill="#3d3b38">语义分类</text>

      <rect x="774" y="250" width="190" height="120" rx="16" fill="#fffefa" stroke="#cfc7bc" stroke-width="2"/>
      <text x="869" y="298" fill="#8a8178">确定性步骤</text>
      <text x="869" y="334" font-size="22" font-weight="700" fill="#3d3b38">剧集计划</text>

      <rect x="1008" y="250" width="190" height="120" rx="16" fill="#eef8f8" stroke="#008aa0" stroke-width="3"/>
      <text x="1103" y="298" fill="#008aa0">不确定项</text>
      <text x="1103" y="334" font-size="22" font-weight="700" fill="#245f67">人工审阅</text>
    </g>

    <g stroke="#7c746c" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M262 310 H306"/><path d="M290 296 L306 310 L290 324"/>
      <path d="M496 310 H540"/><path d="M524 296 L540 310 L524 324"/>
      <path d="M730 310 H774"/><path d="M758 296 L774 310 L758 324"/>
      <path d="M964 310 H1008"/><path d="M992 296 L1008 310 L992 324"/>
    </g>

    <path d="M1103 370 V446 H745" stroke="#008aa0" stroke-width="4" fill="none" stroke-linecap="round"/>
    <rect x="520" y="446" width="450" height="112" rx="18" fill="#f7eef4" stroke="#6f164c" stroke-width="3"/>
    <text x="745" y="490" text-anchor="middle" font-size="18" fill="#6f164c">发布前检查</text>
    <text x="745" y="530" text-anchor="middle" font-size="26" font-weight="700" fill="#3d3b38">安全门控：不确定结果不得自动发布</text>

    <path d="M745 558 V616" stroke="#6f164c" stroke-width="4"/>
    <path d="M729 600 L745 616 L761 600" stroke="#6f164c" stroke-width="4" fill="none"/>
    <rect x="480" y="616" width="530" height="86" rx="16" fill="#fffefa" stroke="#cfc7bc" stroke-width="2"/>
    <text x="745" y="654" text-anchor="middle" font-size="18" fill="#8a8178">输出</text>
    <text x="745" y="684" text-anchor="middle" font-size="24" font-weight="700" fill="#3d3b38">NFO、海报、字幕与符号链接组成的 Jellyfin 策展树</text>

    <text x="72" y="710" font-size="18" fill="#66635f">硬规则：不修改源文件 · 不直接写 Jellyfin 数据库 · 不自动发布不确定匹配</text>
  </g>
</svg>